<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raven Browser</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #7B2FBE;
      --purple-light: #9B4DDB;
      --purple-dark: #5A1F8A;
      --purple-glow: rgba(123, 47, 190, 0.4);
      --bg: #0a0a0a;
      --bg2: #111111;
      --text: #e8e0f0;
      --muted: #7a6e88;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(123,47,190,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(90,31,138,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(123,47,190,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,47,190,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }


    .nav-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: rgba(10,10,10,0.92);
      border-bottom: 1px solid rgba(123,47,190,0.18);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      z-index: 100;
    }

    .nav-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .nav-btn:hover { background: rgba(123,47,190,0.25); }
    .nav-btn svg { width: 12px; height: 12px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; }

    .nav-url {
      flex: 1;
      height: 30px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(123,47,190,0.2);
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      cursor: text;
      transition: border-color 0.2s, background 0.2s;
    }
    .nav-url:focus-within {
      border-color: var(--purple-light);
      background: rgba(123,47,190,0.08);
    }

    .nav-lock { width: 11px; height: 11px; stroke: #6bcb6b; fill: none; stroke-width: 2; flex-shrink: 0; }

    .nav-url input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      color: var(--muted);
      min-width: 0;
    }
    .nav-url input:focus { color: var(--text); }

    .profile-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(123,47,190,0.35);
      color: var(--purple-light);
      background: rgba(123,47,190,0.12);
      white-space: nowrap;
      flex-shrink: 0;
    }




    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      padding-top: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: fadeDown 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    .logo-img {
      width: 88px; height: 88px;
      border-radius: 50%;
      box-shadow:
        0 0 0 1px rgba(123,47,190,0.3),
        0 0 32px rgba(123,47,190,0.35),
        0 0 80px rgba(123,47,190,0.15);
      transition: box-shadow 0.3s ease;
    }
    .logo-img:hover {
      box-shadow:
        0 0 0 1px rgba(123,47,190,0.6),
        0 0 48px rgba(123,47,190,0.55),
        0 0 100px rgba(123,47,190,0.25);
    }

    .logo-title {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text);
      text-shadow: 0 0 40px rgba(123,47,190,0.5);
    }

    .search-wrap {
      margin-top: 48px;
      width: 100%;
      max-width: 580px;
      padding: 0 24px;
      animation: fadeUp 0.9s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 20px;
      width: 18px; height: 18px;
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(123,47,190,0.25);
      border-radius: 999px;
      padding: 16px 56px 16px 52px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      backdrop-filter: blur(8px);
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus {
      border-color: var(--purple-light);
      background: rgba(123,47,190,0.07);
      box-shadow: 0 0 0 3px rgba(123,47,190,0.15), 0 0 32px rgba(123,47,190,0.1);
    }
    .search-box:focus-within .search-icon { color: var(--purple-light); }

    .search-btn {
      position: absolute;
      right: 8px;
      background: var(--purple);
      border: none;
      border-radius: 999px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      color: #fff;
    }
    .search-btn:hover {
      background: var(--purple-light);
      box-shadow: 0 0 20px rgba(123,47,190,0.5);
      transform: scale(1.05);
    }
    .search-btn:active { transform: scale(0.97); }

    .hint {
      margin-top: 14px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      animation: fadeUp 1s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <button class="nav-btn" onclick="history.back()" title="Voltar">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-btn" onclick="history.forward()" title="Avançar">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="nav-btn" onclick="location.reload()" title="Recarregar">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>

    <div class="nav-url">
      <svg class="nav-lock" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="text" id="nav-input" spellcheck="false"
        placeholder="Pesquisar ou digitar endereço..."
        onkeydown="if(event.key==='Enter') navegar(this.value)"/>
    </div>

    <div class="profile-badge" id="badge">Normal</div>
  </nav>

  <div class="container">
    <div class="logo-wrap">
      <img class="logo-img" src="../branding/icon.png" alt="Raven">
      <span class="logo-title">Raven Browser</span>
    </div>

    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" id="busca"
          placeholder="Pesquise ou digite um endereço..."
          autocomplete="off" autofocus/>
        <button class="search-btn" onclick="pesquisar()" title="Pesquisar">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
      </div>
      <p class="hint">Pressione Enter para pesquisar · DuckDuckGo</p>
    </div>
  </div>

  <script>
    const input = document.getElementById('busca');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') pesquisar(); });

    function resolver(texto) {
      if (!texto) return null;
      try {
        const comSchema = texto.startsWith('http') ? texto : 'https://' + texto;
        const parsed = new URL(comSchema);
        if (parsed.hostname.includes('.')) return comSchema;
        throw new Error();
      } catch {
        return 'https://duckduckgo.com/?q=' + encodeURIComponent(texto);
      }
    }

    function pesquisar() {
      const url = resolver(input.value.trim());
      if (url) window.location.href = url;
    }

    function navegar(texto) {
      const url = resolver(texto.trim());
      if (url) window.location.href = url;
    }


    function atualizarNavBar() {
      const navInput = document.getElementById('nav-input');
      navInput.value = window.location.href.includes('127.0.0.1')
        ? '' : window.location.href;
      navInput.placeholder = window.location.href;
    }
    atualizarNavBar();

  
    const params = new URLSearchParams(window.location.search);
    const perfil = params.get('perfil') || 'normal';
    const badge = document.getElementById('badge');
    const nomes = { normal: 'Normal', vpn: 'VPN', amnesia: 'Amnesia' };
    badge.textContent = nomes[perfil] || 'Normal';
    badge.className = 'profile-badge ' + perfil;
  </script>
</body>
</html>
